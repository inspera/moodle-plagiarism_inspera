name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        # -------------------------------------------------------------------
        # PRIVATE REPO TIP: I have commented out all the older versions.
        # Just run ONE combination (Moodle 4.3 + PHP 8.1) while testing privately.
        # When you go public, uncomment the rest of these lines!
        # -------------------------------------------------------------------
        moodle-branch: 
          # - 'MOODLE_311_STABLE'
          # - 'MOODLE_400_STABLE'
          # - 'MOODLE_401_STABLE'
          # - 'MOODLE_402_STABLE'
          - 'MOODLE_403_STABLE'
          # - 'master'
        php: 
          # - '7.4'
          # - '8.0'
          - '8.1'
          # - '8.2'
        database: 
          - pgsql
          # - mysqli

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, gd, xml, zip, sodium
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4.0
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH

      - name: Install Moodle
        run: moodle-plugin-ci install
        env:
          DB: ${{ matrix.database }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: Moodle Codechecker
        run: moodle-plugin-ci codechecker

      - name: Moodle Plugin Validate
        run: moodle-plugin-ci validate

      - name: Savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit

      # You can comment this out if you haven't written Behat tests yet, 
      # as it takes a long time to run!
      # - name: Behat features
      #   run: moodle-plugin-ci behat