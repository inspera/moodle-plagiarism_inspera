name: Moodle Plugin CI

on:
  push:
    branches:
      - master
      - main
      - 'task/**'
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Silence the Node.js deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IGNORE_PATHS: 'moodle,../ci,ci'
  IGNORE_NAMES: '.git,.github'

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - 'MOODLE_405_STABLE'
        php:
          - '8.1'
        database:
          - pgsql

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Clone in plugin subdir, so we can setup CI in default directory.
          path: plugin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, gd, xml, zip, sodium
          ini-values: max_input_vars=5000
          coverage: none

      - name: Deploy moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4.3
          # This line ensures the bin folder is added to the global PATH for all future steps
          # Add dirs to $PATH
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          # PHPUnit depends on en_AU.UTF-8 locale
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle
        run: moodle-plugin-ci install -vvv --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Initialize PHPUnit
        if: ${{ always() }}
        run: php moodle/admin/tool/phpunit/cli/init.php

      - name: PHP Lint
        if: ${{ always() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        if: ${{ always() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Codechecker
        if: ${{ always() }}
        run: moodle-plugin-ci codechecker

      - name: Moodle Plugin Validate
        if: ${{ always() }}
        run: moodle-plugin-ci validate

      - name: Savepoints
        if: ${{ always() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ always() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ always() }}
        run: moodle-plugin-ci grunt

      - name: PHPUnit tests
        if: ${{ always() }}
        run: moodle-plugin-ci phpunit

      # You can comment this out if you haven't written Behat tests yet,
      # as it takes a long time to run!
      # - name: Behat features
      #   run: moodle-plugin-ci behat