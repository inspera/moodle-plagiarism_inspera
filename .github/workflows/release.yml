name: Build and Release Plugin

on:
  push:
    tags:
      - '20[0-9][0-9].*'

jobs:
  build:
    name: Build Moodle Zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Zip Archive
        # Automatically adds the tag to the filename
        # Example output: originality-2026.01.0.zip
        run: git archive -o originality-${{ github.ref_name }}.zip --prefix=originality/ HEAD

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Tells GitHub to pick up the specific file we just created
          files: originality-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
