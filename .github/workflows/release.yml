name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag starting with "v" (e.g. v1.0.0)

jobs:
  build:
    name: Build Moodle Zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Zip Archive
        # Creates 'originality-v1.0.0.zip' containing folder 'originality/'
        run: git archive -o originality-${{ github.ref_name }}.zip --prefix=originality/ HEAD

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: originality-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
